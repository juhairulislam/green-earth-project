<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    

    <!-- Tailwind and daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- link with css -->

<body>
   
    <main class="container mx-auto text-center">
        <h2 class="text-[#15803D] text-4xl font-semibold  ">Choose Your Trees</h2>

        <!-- categories -->
        <div class="bg-white shadow-xl rounded-md col-span-3 ">

                  <button class="btn btn-success w-full " id="allTrees">All trees</button>

             </div>
            </div>

        </div>
        <div class="bg-green-500 col-span-6">trees</div>
        <div class="bg-blue-500 col-span-3 ">cart</div>

    <script src="./script.js"></script>
